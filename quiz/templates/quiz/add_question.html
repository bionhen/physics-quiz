{% extends 'quiz/base.html' %}
{% block content %}
<h2>➕ Добавить новый вопрос</h2>

{% if messages %}
    {% for message in messages %}
        <div style="background: #e8f5e9; padding: 10px; border-radius: 5px; margin-bottom: 20px;">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
</form>
{% endblock %}
